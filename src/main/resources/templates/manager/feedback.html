<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }
        h2 {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .feedback-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .feedback-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .feedback-header {
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        .rating {
            color: #ffc107;
            font-weight: bold;
            margin-left: 10px;
        }
        .badge-event {
            margin-left: 10px;
            background-color: #20c997;
            color: white;
        }
        .feedback-text {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #555;
        }
        .analysis-link {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #6a11cb;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .analysis-link:hover {
            background: #2575fc;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Customer Feedback</h2>

    <div th:if="${#lists.isEmpty(feedback)}" class="alert alert-info text-center">
        No feedback available
    </div>

    <div th:each="f : ${feedback}" class="feedback-card">
        <div class="feedback-header">
            <span th:text="${f.guest != null ? (f.guest.firstName + ' ' + (f.guest.lastName != null ? f.guest.lastName : '')) : 'Guest'}">Guest Name</span>
            <span class="rating" th:text="${f.rating}">5</span><i class="fas fa-star"></i>
            <span th:if="${f.event != null}" class="badge badge-event" th:text="${f.event.eventType}">Event Type</span>
        </div>
        <p class="feedback-text" th:text="${f.feedbackText}">Customer comment goes here...</p>
    </div>

    <div class="text-center">
        <a href="/manager/feedback/analysis" class="analysis-link">View Feedback Analysis</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
