<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        h2 {
            font-weight: 600;
        }
        .metric-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 10px;
        }
        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .chart-card {
            border-radius: 10px;
            padding: 15px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        table th, table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="text-center mb-5">Hotel Reports Dashboard</h2>

    <!-- Metrics -->
    <div class="row text-center mb-5">
        <div class="col-md-3 mb-3">
            <div class="p-4 bg-white border metric-card">
                <h3 th:text="${bookingReport['totalBookings']}">0</h3>
                <small class="text-muted">Total Bookings</small>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="p-4 bg-white border metric-card">
                <h3 th:text="'$' + ${revenueReport['totalRevenue']}">$0</h3>
                <small class="text-muted">Total Revenue</small>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="p-4 bg-white border metric-card">
                <h3 th:text="${bookingReport['averageGuestsPerBooking']}">0</h3>
                <small class="text-muted">Avg Guests/Booking</small>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="p-4 bg-white border metric-card">
                <h3 th:text="${#lists.size(bookingReport['bookingsByEventType'])}">0</h3>
                <small class="text-muted">Event Types Booked</small>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row mb-5">
        <div class="col-md-6">
            <div class="chart-card">
                <h5 class="mb-3">Bookings by Status</h5>
                <canvas id="bookingsByStatusChart" height="200"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="chart-card">
                <h5 class="mb-3">Revenue by Method</h5>
                <canvas id="revenueByMethodChart" height="200"></canvas>
            </div>
        </div>
    </div>

    <!-- Tables -->
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="chart-card">
                <h5>Bookings by Event Type</h5>
                <table class="table table-hover table-bordered">
                    <thead class="table-light">
                    <tr>
                        <th>Event Type</th>
                        <th class="text-end">Count</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${bookingReport['bookingsByEventType']}">
                        <td th:text="${entry.key}">Event</td>
                        <td class="text-end" th:text="${entry.value}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="chart-card">
                <h5>Revenue by Method</h5>
                <table class="table table-hover table-bordered">
                    <thead class="table-light">
                    <tr>
                        <th>Method</th>
                        <th class="text-end">Amount</th>
                        <th class="text-end">%</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry : ${revenueReport['revenueByMethod']}">
                        <td th:text="${entry.key}">Method</td>
                        <td class="text-end" th:text="'$' + ${entry.value}">$0</td>
                        <td class="text-end" th:text="${#numbers.formatDecimal((entry.value / revenueReport['totalRevenue']) * 100, 1, 1)} + '%'">0%</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Back button -->
    <div class="text-center mt-4">
        <a href="/manager/dashboard" class="btn btn-primary btn-lg">Back to Dashboard</a>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const bsLabels = [[${bookingReport['bookingsByStatus']?.keySet()}]];
    const bsData = [[${bookingReport['bookingsByStatus']?.values()}]];

    new Chart(document.getElementById('bookingsByStatusChart'), {
        type: 'doughnut',
        data: {
            labels: bsLabels,
            datasets: [{
                data: bsData,
                backgroundColor: ['#007bff','#28a745','#ffc107','#dc3545','#6c757d']
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } }
        }
    });

    const rmLabels = [[${revenueReport['revenueByMethod']?.keySet()}]];
    const rmData = [[${revenueReport['revenueByMethod']?.values()}]];

    new Chart(document.getElementById('revenueByMethodChart'), {
        type: 'pie',
        data: {
            labels: rmLabels,
            datasets: [{
                data: rmData,
                backgroundColor: ['#17a2b8','#ffc107','#28a745','#dc3545','#6c757d']
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } }
        }
    });
    /*]]>*/
</script>
</body>
</html>
