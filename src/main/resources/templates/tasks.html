<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-3">
<a th:href="@{/manager/dashboard}" class="btn btn-link">Back</a>
<h3>Tasks</h3>
<table class="table table-bordered">
    <thead><tr><th>ID</th><th>Event</th><th>Description</th><th>Assigned To</th><th>Status</th></tr></thead>
    <tbody>
    <tr th:each="t : ${tasks}">
        <td th:text="${t.taskId}"></td>
        <td th:text="${t.event != null ? t.event.eventName : 'N/A'}"></td>
        <td th:text="${t.description}"></td>
        <td th:text="${t.assignTo != null ? t.assignTo.name : 'Unassigned'}"></td>
        <td th:text="${t.status}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
